<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Эко-патруль</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  position: fixed;
  width:100%; height:100%;
  background:#000;
  font-family:sans-serif;
  overflow: hidden;
}

/* КНОПКА СТАРТА */
.start-btn {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  z-index:1000;
  color:white;
  flex-direction:column;
}

.start-btn button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#66BB6A;
  color:white;
}

/* UI */
.score {
  position:absolute;
  top:20px; right:20px;
  background:rgba(0,0,0,0.7);
  padding:10px 15px;
  border-radius:20px;
  color:white;
  z-index:100;
}

.info {
  position:absolute;
  bottom:20px; left:20px; right:20px;
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:15px;
  color:white;
  z-index:100;
}

.hidden { display:none; }

/* 👇 ГЛАВНОЕ - заставляем контейнер и сцену быть на весь экран */
#sceneContainer {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1 !important;
}

#sceneContainer a-scene {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  display: block !important;
}

.a-canvas {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
}
</style>
</head>
<body>

<div class="start-btn" id="startScreen">
  <h2>🌍 Эко-патруль</h2>
  <button onclick="startAR()">Начать</button>
</div>

<div class="score hidden" id="scorePanel">
  Найдено: <span id="score">0</span>/4
</div>

<div class="info hidden" id="info">
  Наведи камеру на предмет
</div>

<div id="sceneContainer"></div>

<script>
let found = 0;
const collected = [false,false,false,false];

const targets = [
{
 index:0,
 color:"#FF5722",
 text:"Батарейка\nСдавай в спец. пункты",
 msg:"🔋 Батарейка!"
},
{
 index:1,
 color:"#4CAF50",
 text:"Пластик\n450 лет разложения",
 msg:"🍼 Бутылка!"
},
{
 index:2,
 color:"#2196F3",
 text:"Стакан\nНе перерабатывается",
 msg:"🥤 Стакан!"
},
{
 index:3,
 color:"#9C27B0",
 text:"Аэрозоль\nОпасный отход",
 msg:"💨 Баллончик!"
}
];

function startAR(){
 document.getElementById('startScreen').style.display='none';

 const sceneHTML = `
 <a-scene
   mindar-image="imageTargetSrc: targets.mind;"
   embedded
   vr-mode-ui="enabled:false"
   device-orientation-permission-ui="enabled:true"
   style="position:fixed; top:0; left:0; width:100%; height:100%;"
 >
   <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

   ${targets.map(t=>`
   <a-entity mindar-image-target="targetIndex:${t.index}" id="t${t.index}">
     <a-plane color="${t.color}" width="1.2" height="0.6">
       <a-text value="${t.text}"
         align="center"
         color="white"
         width="1"
         position="0 0 0.01">
       </a-text>
     </a-plane>
   </a-entity>
   `).join('')}

 </a-scene>
 `;

 document.getElementById('sceneContainer').innerHTML = sceneHTML;

 setTimeout(()=>{
   attachListeners();
   document.getElementById('scorePanel').classList.remove('hidden');
   document.getElementById('info').classList.remove('hidden');
 },1000);
}

function attachListeners(){
 targets.forEach(t=>{
   const el = document.getElementById(`t${t.index}`);

   el.addEventListener("targetFound", ()=>{
     if(!collected[t.index]){
       collected[t.index]=true;
       found++;

       document.getElementById('score').innerText = found;
       document.getElementById('info').innerText = t.msg;

       if(found===4){
         setTimeout(()=>{
           alert("🎉 Ты ЭКО-ГЕРОЙ!");
         },500);
       }
     }
   });
 });
}
</script>

</body>
</html>
