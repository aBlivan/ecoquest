<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Эко-патруль — AR сортировка отходов</title>

<!-- A-Frame и MindAR -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}

body {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0a0f1e;
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
  overflow: hidden;
}

/* СТАРТОВЫЙ ЭКРАН */
.start-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #0b2f1f 0%, #05100a 100%);
  z-index: 1000;
  backdrop-filter: blur(2px);
  flex-direction: column;
  gap: 24px;
  text-align: center;
}

.start-screen h2 {
  font-size: 2.2rem;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #b9fbc0, #6fcf97);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.start-screen p {
  color: #cfead9;
  max-width: 280px;
  font-size: 1rem;
  padding: 0 20px;
}

.start-btn {
  background: #2e7d32;
  border: none;
  padding: 14px 32px;
  font-size: 1.3rem;
  font-weight: bold;
  border-radius: 60px;
  color: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: 0.2s;
  cursor: pointer;
}

.start-btn:active {
  transform: scale(0.96);
  background: #1b5e20;
}

/* UI панели */
.score-panel {
  position: absolute;
  top: 18px;
  right: 18px;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(8px);
  padding: 8px 20px;
  border-radius: 50px;
  color: white;
  font-weight: bold;
  font-size: 1.3rem;
  border: 1px solid #6fcf97;
  z-index: 200;
  font-family: monospace;
  letter-spacing: 1px;
}

.info-panel {
  position: absolute;
  bottom: 24px;
  left: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(12px);
  padding: 14px 18px;
  border-radius: 32px;
  color: #e9f5e9;
  text-align: center;
  font-weight: 500;
  font-size: 1rem;
  border-left: 5px solid #66bb6a;
  z-index: 200;
  transition: 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.hidden {
  display: none;
}

/* маленькая подсказка для камеры */
.camera-hint {
  position: absolute;
  bottom: 100px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 12px;
  color: #ccc;
  background: rgba(0,0,0,0.5);
  width: fit-content;
  margin: 0 auto;
  padding: 5px 12px;
  border-radius: 50px;
  z-index: 200;
  pointer-events: none;
}

/* контейнер для сцены */
#sceneContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
}

/* AFrame canvas должен заполнять экран */
.a-canvas {
  width: 100% !important;
  height: 100% !important;
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
}

/* модальное поздравление стилизованное */
.toast-eco {
  position: fixed;
  bottom: 90px;
  left: 20px;
  right: 20px;
  background: #1e3a2f;
  color: #f7f9c6;
  text-align: center;
  padding: 14px;
  border-radius: 40px;
  font-weight: bold;
  z-index: 300;
  animation: fadeUp 0.4s ease;
  box-shadow: 0 6px 18px black;
  backdrop-filter: blur(8px);
  border: 1px solid gold;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <h2>♻️ Эко-патруль</h2>
  <p>Наведи камеру на экологические метки<br> и собери 4 вида опасных отходов</p>
  <button class="start-btn" id="launchBtn">🌿 Активировать камеру</button>
  <div style="font-size:12px; opacity:0.7;">🔐 требуется разрешение на камеру</div>
</div>

<div class="score-panel hidden" id="scorePanel">
  🌱 Найдено: <span id="scoreValue">0</span> / 4
</div>

<div class="info-panel hidden" id="infoPanel">
  📍 Наведи камеру на маркер
</div>

<div id="sceneContainer"></div>

<script>
  // =========  СОСТОЯНИЕ  ===========
  let foundCount = 0;
  const collected = [false, false, false, false];

  // Описание таргетов (должно совпадать с targets.mind)
  // Визуальные карточки, которые отобразятся при распознавании
  const targetsMeta = [
    { index: 0, color: "#E64A2E", text: "🔋 БАТАРЕЙКА\nОпасные отходы", msg: "🔋 Батарейка! Сдай в эко-пункт" },
    { index: 1, color: "#2E7D32", text: "🥤 ПЛАСТИК\n450 лет разложения", msg: "🍼 Пластиковая бутылка! Сокращай пластик" },
    { index: 2, color: "#1E88E5", text: "🥛 СТЕКЛО\nНеразлагаемое", msg: "🥤 Стеклянный стакан! Переработка важна" },
    { index: 3, color: "#8E24AA", text: "💨 АЭРОЗОЛЬ\nВзрывоопасно", msg: "💨 Баллончик! Опасный отход" }
  ];

  // флаг, чтобы не навешивать повторно
  let listenersAttached = false;
  let currentScene = null;

  // функция полного запуска AR
  function startAR() {
    // скрыть стартовый экран
    const startDiv = document.getElementById('startScreen');
    if (startDiv) startDiv.style.display = 'none';

    // Показать панели UI
    document.getElementById('scorePanel')?.classList.remove('hidden');
    document.getElementById('infoPanel')?.classList.remove('hidden');

    // Убедимся, что контейнер чистый
    const container = document.getElementById('sceneContainer');
    if (!container) return;
    container.innerHTML = ''; 

    // ПОДГОТОВКА MINDFUL: используем встроенную мишень mindar-image
    // Создаём A-FRAME сцену с корректным доступом к камере и обработкой ошибок
    const sceneEl = document.createElement('a-scene');
    sceneEl.setAttribute('mindar-image', 'imageTargetSrc: targets.mind;');
    sceneEl.setAttribute('embedded', '');
    sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
    sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');
    // важный атрибут для мобильных устройств — запрос камеры
    sceneEl.setAttribute('renderer', 'antialias: true; alpha: false');
    
    // Добавим камеру с контролем (можно без look-controls, чтобы не мешать)
    const camera = document.createElement('a-camera');
    camera.setAttribute('position', '0 0 0');
    camera.setAttribute('look-controls', 'enabled: false');
    // отключаем всякие лишние штуки
    sceneEl.appendChild(camera);

    // Добавляем 4 сущности для каждого таргета (как в твоём примере, но с усиленными материалами)
    targetsMeta.forEach(t => {
      const entity = document.createElement('a-entity');
      entity.setAttribute('mindar-image-target', `targetIndex: ${t.index}`);
      entity.setAttribute('id', `target_${t.index}`);
      
      // Создаём карточку (прямоугольник с текстом) — будет плавать в воздухе над маркером
      const plane = document.createElement('a-plane');
      plane.setAttribute('color', t.color);
      plane.setAttribute('width', '1.4');
      plane.setAttribute('height', '0.7');
      plane.setAttribute('position', '0 0 0');
      
      // Текст на плоскости
      const textEl = document.createElement('a-text');
      textEl.setAttribute('value', t.text);
      textEl.setAttribute('align', 'center');
      textEl.setAttribute('color', 'white');
      textEl.setAttribute('width', '1.2');
      textEl.setAttribute('position', '0 0 0.02');
      textEl.setAttribute('font', 'exo2bold');
      textEl.setAttribute('wrap-count', '12');
      
      plane.appendChild(textEl);
      entity.appendChild(plane);
      
      // Добавим легкий бэк-эффект — подсветка
      sceneEl.appendChild(entity);
    });

    // Добавляем вспомогательную подсветку для лучшей видимости маркеров (опционально)
    const ambientLight = document.createElement('a-light');
    ambientLight.setAttribute('type', 'ambient');
    ambientLight.setAttribute('intensity', '0.6');
    sceneEl.appendChild(ambientLight);
    
    const directionalLight = document.createElement('a-light');
    directionalLight.setAttribute('type', 'directional');
    directionalLight.setAttribute('position', '1 2 1');
    directionalLight.setAttribute('intensity', '0.8');
    sceneEl.appendChild(directionalLight);
    
    container.appendChild(sceneEl);
    currentScene = sceneEl;
    
    // ПРИНУДИТЕЛЬНО ЗАПРАШИВАЕМ КАМЕРУ ЧЕРЕЗ ПОЛЬЗОВАТЕЛЬСКОЕ ВЗАИМОДЕЙСТВИЕ
    // Для мобильных браузеров обязательно вызываем запуск AR после клика (уже внутри startAR)
    // Дополнительно: через небольшую задержку инициируем MindAR старт
    setTimeout(() => {
      if (sceneEl && sceneEl.components && sceneEl.components['mindar-image']) {
        const arSystem = sceneEl.components['mindar-image'];
        if (arSystem && typeof arSystem.start === 'function') {
          arSystem.start();
        } else {
          // fallback: найти mindar-image через query
          const mindarComp = sceneEl.querySelector('[mindar-image]')?.components?.['mindar-image'];
          if (mindarComp && mindarComp.start) mindarComp.start();
        }
      } else {
        // Если компонент ещё не загружен, пробуем ещё раз
        const tryStart = setInterval(() => {
          if (sceneEl && sceneEl.components && sceneEl.components['mindar-image']) {
            sceneEl.components['mindar-image'].start();
            clearInterval(tryStart);
          }
        }, 300);
        setTimeout(() => clearInterval(tryStart), 5000);
      }
    }, 200);
    
    // Вешаем обработчики на targetFound, но только после загрузки сцены
    attachListenersWithRetry();
  }

  // Функция для надёжного добавления слушателей на появляющиеся сущности
  function attachListenersWithRetry() {
    let attempts = 0;
    const maxAttempts = 20;
    const interval = setInterval(() => {
      let allEntitiesExist = true;
      for (let i = 0; i < targetsMeta.length; i++) {
        const el = document.getElementById(`target_${i}`);
        if (!el) {
          allEntitiesExist = false;
          break;
        }
      }
      if (allEntitiesExist || attempts >= maxAttempts) {
        clearInterval(interval);
        for (let i = 0; i < targetsMeta.length; i++) {
          const entity = document.getElementById(`target_${i}`);
          if (entity && !entity.hasAttribute('listener-attached')) {
            // Удаляем старые слушатели, если есть, но для чистоты добавим новые
            entity.removeEventListener('targetFound', targetFoundHandler);
            entity.removeEventListener('targetLost', targetLostHandler);
            // Привязываем обработчики с нужным индексом
            const idx = targetsMeta[i].index;
            const handlerFound = () => targetFoundHandler(idx);
            const handlerLost = () => targetLostHandler(idx);
            entity.addEventListener('targetFound', handlerFound);
            entity.addEventListener('targetLost', handlerLost);
            // храним пользовательские данные
            entity.setAttribute('listener-attached', 'true');
            entity._foundHandler = handlerFound;
            entity._lostHandler = handlerLost;
          }
        }
      }
      attempts++;
    }, 300);
  }
  
  // универсальный обработчик найденного таргета
  function targetFoundHandler(index) {
    if (!collected[index]) {
      collected[index] = true;
      foundCount++;
      
      // обновляем UI
      const scoreSpan = document.getElementById('scoreValue');
      if (scoreSpan) scoreSpan.innerText = foundCount;
      
      const infoDiv = document.getElementById('infoPanel');
      const meta = targetsMeta.find(t => t.index === index);
      if (meta && infoDiv) {
        infoDiv.innerHTML = `✅ ${meta.msg}`;
        // через 2.5 секунды вернуть стандартную подсказку
        setTimeout(() => {
          if (infoDiv && foundCount < 4) {
            infoDiv.innerHTML = `🔍 Наведи камеру на следующий предмет`;
          } else if (foundCount === 4) {
            infoDiv.innerHTML = `🏆 ВСЕ ОТХОДЫ НАЙДЕНЫ! Ты эко-герой!`;
          }
        }, 2800);
      }
      
      // показываем всплывающее уведомление (тост)
      showEcoToast(meta ? meta.msg : `Предмет #${index+1} собран!`);
      
      // если собраны все 4 — поздравление
      if (foundCount === 4) {
        setTimeout(() => {
          infoDiv.innerHTML = `🎉 ПОЗДРАВЛЯЮ! 🎉<br> Ты спас планету от 4 опасных отходов!`;
          const finalToast = document.createElement('div');
          finalToast.className = 'toast-eco';
          finalToast.innerHTML = '♻️ ЭКО-ГЕРОЙ! Ты прошёл миссию! 🌍';
          document.body.appendChild(finalToast);
          setTimeout(() => finalToast.remove(), 4000);
        }, 400);
      }
    } else {
      // Если уже найден этот объект, но всё равно покажем напоминание
      const infoDiv = document.getElementById('infoPanel');
      if (infoDiv && foundCount < 4) {
        infoDiv.innerHTML = `♻️ Уже найден! Ищи другие предметы.`;
        setTimeout(() => {
          if (infoDiv && foundCount < 4) infoDiv.innerHTML = `🔍 Наведи камеру на следующий предмет`;
        }, 1500);
      }
    }
  }
  
  function targetLostHandler(index) {
    // можно ничего не делать, просто опционально
    if (foundCount < 4) {
      // небольшая подсказка когда теряем метку
      const infoDiv = document.getElementById('infoPanel');
      if (infoDiv && !infoDiv.innerHTML.includes('✅') && !infoDiv.innerHTML.includes('Найден')) {
        // не затираем важные сообщения
        if (foundCount === 0) infoDiv.innerHTML = `🔎 Перемещай камеру, чтобы найти метки`;
      }
    }
  }
  
  // создание красивого всплывающего сообщения (тост)
  function showEcoToast(message) {
    const existingToasts = document.querySelectorAll('.dynamic-toast');
    existingToasts.forEach(t => t.remove());
    const toast = document.createElement('div');
    toast.className = 'toast-eco dynamic-toast';
    toast.style.bottom = '140px';
    toast.style.background = '#1e4620';
    toast.style.fontSize = '1rem';
    toast.innerHTML = `🌱 +1 ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => {
      if (toast) toast.style.opacity = '0';
      setTimeout(() => toast?.remove(), 500);
    }, 2000);
  }
  
  // ДОБАВЛЯЕМ ПРИНУДИТЕЛЬНУЮ АКТИВАЦИЮ КАМЕРЫ ПРИ КЛИКЕ
  // К тому же используем современный API для запроса разрешений
  async function requestCameraAndStart() {
    // сначала запрашиваем разрешение на камеру вручную (для надёжности на iOS/Android)
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      // если получили поток — останавливаем его, т.к. его заберёт MindAR
      stream.getTracks().forEach(track => track.stop());
    } catch (err) {
      console.warn("Камера не разрешена или ошибка:", err);
      const infoPanel = document.getElementById('infoPanel');
      if (infoPanel) {
        infoPanel.innerHTML = "⚠️ Нет доступа к камере. Разрешите доступ в настройках браузера.";
        infoPanel.style.background = "#8b0000cc";
      }
      // всё равно запускаем AR, но может не работать
    }
    startAR();
  }
  
  // Вешаем обработчик на кнопку "Активировать камеру"
  const launchBtn = document.getElementById('launchBtn');
  if (launchBtn) {
    launchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      requestCameraAndStart();
    });
  }
  
  // Запасной вариант: если вдруг кто-то нажал на экран "Начать" через старый метод, но у нас новая кнопка
  // Для совместимости, также вешаем обработчик на саму кнопку (в коде выше)
  
  // Предзагрузка (чтобы при клике мгновенно — но мы и так)
  // Дополнительно, если при каких-то условиях камера всё равно не стартует, добавим форсированную перезагрузку AR
  window.addEventListener('load', () => {
    // Просто показываем стартовый экран, без автостарта
    console.log("Приложение Эко-патруль загружено, ожидаем запуска");
  });
  
  // Экспорт глобально для возможного отладчика
  window.resetGame = function() {
    foundCount = 0;
    for(let i=0;i<collected.length;i++) collected[i]=false;
    document.getElementById('scoreValue').innerText = "0";
    document.getElementById('infoPanel').innerHTML = "🔄 Игра сброшена. Наведи камеру на маркеры.";
    // можно перезагрузить сцену? проще перезапустить AR
    if (currentScene && currentScene.components && currentScene.components['mindar-image']) {
      currentScene.components['mindar-image'].stop();
      setTimeout(() => {
        currentScene.components['mindar-image'].start();
      }, 500);
    }
  };
</script>

<!-- Предварительно создаем инструкцию: важная метка для работы с камерой на полный экран -->
<style>
  /* принудительное заполнение области просмотра */
  body, html {
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }
  .a-enter-vr, .a-orientation-modal {
    display: none !important;
  }
  /* повышение видимости текста */
  a-text {
    font-weight: bold;
    text-shadow: 0px 0px 5px rgba(0,0,0,0.5);
  }
</style>

</body>
</html>
